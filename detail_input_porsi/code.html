<body class="bg-surface-gray min-h-screen relative font-body-md text-on-surface antialiased overflow-hidden">
<!-- Scrim / Backdrop -->
<div class="absolute inset-0 bg-on-background/40 z-40" id="backdrop"></div>
<!-- BottomSheet Container -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest rounded-t-[32px] shadow-[0_-8px_24px_rgba(0,0,0,0.12)] z-50 flex flex-col bottom-sheet" style="max-height: 90vh;">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-4 pb-2">
<div class="w-12 h-1.5 bg-outline-variant rounded-full"></div>
</div>
<div class="flex-1 overflow-y-auto no-scrollbar px-container-padding pb-stack-lg">
<!-- Header: Food Image & Title -->
<div class="flex items-center gap-gutter mb-stack-lg mt-stack-sm">
<div class="w-20 h-20 rounded-2xl overflow-hidden shadow-sm flex-shrink-0">

</div>
<div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Nasi Goreng Spesial</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Sajian Restoran (Porsi Sedang)</p>
</div>
</div>
<!-- Hero Metric: Calories -->
<div class="bg-surface rounded-2xl p-container-padding flex flex-col items-center justify-center mb-stack-lg border border-border-subtle shadow-[0_4px_16px_rgba(45,106,79,0.08)]">
<span class="font-metric-display text-metric-display text-primary">485</span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-2 tracking-widest uppercase">Kkal per porsi</span>
</div>
<!-- Interactive Controls: Portion & Meal Type -->
<div class="flex flex-col gap-stack-md mb-stack-lg">
<!-- Stepper -->
<div class="flex items-center justify-between bg-surface-container-low rounded-xl p-2 border border-border-subtle">
<button aria-label="Kurangi porsi" class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-primary">remove</span>
</button>
<div class="flex flex-col items-center">
<span class="font-button-text text-button-text text-on-surface">1.5</span>
<span class="font-label-caps text-label-caps text-on-surface-variant text-[10px]">Porsi</span>
</div>
<button aria-label="Tambah porsi" class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-primary">add</span>
</button>
</div>
<!-- Dropdown (Meal Category) -->

<option value="breakfast">Sarapan</option>
<option selected="" value="lunch">Makan Siang</option>
<option value="dinner">Makan Malam</option>
<option value="snack">Camilan</option>
</select>

<span class="material-symbols-outlined">expand_more</span>
</div>

</div>

<div class="h-full bg-secondary-container" style="width: 60%;"></div>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">LEMAK</span>
<span class="font-button-text text-button-text text-on-surface font-mono">22.0g</span>
</div>
<!-- Carbs -->
<div class="bg-surface rounded-xl p-3 border border-border-subtle flex flex-col items-center text-center">
<div class="w-full h-1.5 bg-surface-container-high rounded-full mb-2 overflow-hidden">
<div class="h-full bg-health-green-vibrant" style="width: 80%;"></div>
</div>

</div>
</div>
</div>

<button class="w-full bg-primary text-on-primary font-button-text text-button-text rounded-xl py-4 flex items-center justify-center gap-2 hover:bg-surface-tint transition-colors active:scale-[0.98] mt-4 shadow-[0_4px_12px_rgba(15,82,56,0.2)]">
<span class="material-symbols-outlined">add_circle</span>
                Tambahkan ke Jurnal

<!-- Script for subtle interactions -->
<script>
        // Simple backdrop click to 'dismiss' (simulated)
        document.getElementById('backdrop').addEventListener('click', () => {
            const sheet = document.querySelector('.bottom-sheet');
            sheet.style.transform = 'translateY(100%)';
            sheet.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
            document.getElementById('backdrop').style.opacity = '0';
            document.getElementById('backdrop').style.transition = 'opacity 0.3s ease';
        });
    </script>
